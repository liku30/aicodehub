server:
  port: 8080

spring:
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/aicodehub?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456  # 改成你自己的MySQL密码

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:   # 如果Redis没设密码就留空
      database: 0

  # 文件上传大小限制
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true  # 下划线转驼峰
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 打印SQL（开发用）
  global-config:
    db-config:
      id-type: auto  # 主键自增
      logic-delete-field: isDeleted  # 逻辑删除字段
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: AiCodeHubSecretKey2024ThisIsAVeryLongSecretKeyForJWTTokenGeneration
  expiration: 604800000  # 7天，单位毫秒

# DeepSeek AI配置
# 获取API Key: https://platform.deepseek.com/api_keys
ai:
  deepseek:
    api-key: sk-ccc71596c14a4751800002f78d35cff3
    base-url: https://api.deepseek.com
    model: deepseek-chat

# 日志配置
logging:
  level:
    com.aicodehub: debug
    org.springframework.security: debug

# Knife4j API文档
knife4j:
  enable: true
  setting:
    language: zh_cn
